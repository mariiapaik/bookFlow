services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookflow
      POSTGRES_PASSWORD: bookflow
      POSTGRES_DB: bookflow
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookflow']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
      SALON_NAME: Bloom Beauty Studio
      SALON_TIMEZONE: Europe/Berlin
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: bookflow
      DB_PASSWORD: bookflow
      DB_NAME: bookflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-production
      # SMTP unset → emails logged to backend console (demo mode)
    ports:
      - '3000:3000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  db_data:
